name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Compile backend
        run: uv run --python 3.10 python -m py_compile web_app.py liteplex.py

      - name: Import backend
        run: uv run --python 3.10 --with-requirements requirements.txt python -c "import liteplex, web_app; web_app.init_assistant()"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm audit --audit-level=low

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Type-check frontend
        working-directory: frontend
        run: npm run type-check

      - name: Build frontend
        working-directory: frontend
        run: npm run build
